
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Exercise - The House</title>

<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 900px;
        margin: 20px auto;
        padding: 20px;
        background-color: #f4f4f4;
    }

    h1 {
        text-align: center;
        color: #333;
    }

    .container {
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .reading-text {
        background: #eef7ff;
        padding: 15px;
        border-left: 5px solid #2196F3;
        margin-bottom: 20px;
    }

    .question {
        margin-bottom: 20px;
    }

    button {
        background-color: #2196F3;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background-color: #1976D2;
    }

    #result {
        margin-top: 20px;
        font-size: 20px;
        font-weight: bold;
    }
</style>
</head>

<body>
<form id="quizForm">

<div class="question">
<p><strong>1. What is the name of the son?</strong></p>
<label><input type="radio" name="q1" value="a"> Sarah</label><br>
<label><input type="radio" name="q1" value="b"> John</label><br>
<label><input type="radio" name="q1" value="c"> Smith</label>
</div>

<div class="question">
<p><strong>2. Where do they watch TV?</strong></p>
<label><input type="radio" name="q2" value="a"> Kitchen</label><br>
<label><input type="radio" name="q2" value="b"> Bedroom</label><br>
<label><input type="radio" name="q2" value="c"> Living Room</label>
</div>

<div class="question">
<p><strong>3. Where does the father cook food?</strong></p>
<label><input type="radio" name="q3" value="a"> Kitchen</label><br>
<label><input type="radio" name="q3" value="b"> Bathroom</label><br>
<label><input type="radio" name="q3" value="c"> Garden</label>
</div>

<div class="question">
<p><strong>4. How many bedrooms are there?</strong></p>
<label><input type="radio" name="q4" value="a"> One</label><br>
<label><input type="radio" name="q4" value="b"> Two</label><br>
<label><input type="radio" name="q4" value="c"> Three</label>
</div>

<div class="question">
<p><strong>5. What pet do they have?</strong></p>
<label><input type="radio" name="q5" value="a"> Cat</label><br>
<label><input type="radio" name="q5" value="b"> Rabbit</label><br>
<label><input type="radio" name="q5" value="c"> Dog</label>
</div>

<button type="button" onclick="checkAnswers()">Submit</button>

</form>

<div id="result"></div>

</div>

<script>

function checkAnswers() {

    let score = 0;

    const answers = {
        q1: "b",
        q2: "c",
        q3: "a",
        q4: "b",
        q5: "c"
    };

    for (let question in answers) {
        let selected = document.querySelector(`input[name="${question}"]:checked`);

        if (selected && selected.value === answers[question]) {
            score++;
        }
    }

    let percentage = (score / 5) * 100;

    document.getElementById("result").innerHTML =
        `Your Score: ${score}/5 (${percentage}%)`;
}

</script>

</body>
</html>
